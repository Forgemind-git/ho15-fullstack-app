<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener &amp; Bookmarks — HO15</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#F8F9FA; color:#1a1a2e; min-height:100vh; }
    :root { --color:#BE185D; }
    header { background:var(--color); color:#fff; padding:24px 32px; }
    header h1 { font-size:22px; font-weight:800; margin-bottom:4px; }
    header p { font-size:14px; opacity:.85; }
    .container { max-width:900px; margin:0 auto; padding:24px 16px; }
    .card { background:#fff; border-radius:10px; box-shadow:0 1px 6px rgba(0,0,0,.08); padding:24px; margin-bottom:20px; }
    .card h2 { font-size:16px; font-weight:700; margin-bottom:16px; color:var(--color); }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:600px){ .form-grid{ grid-template-columns:1fr; } }
    label { font-size:13px; font-weight:600; color:#374151; display:block; margin-bottom:4px; }
    input { width:100%; padding:9px 12px; border:1px solid #D1D5DB; border-radius:6px; font-size:14px; outline:none; }
    input:focus { border-color:var(--color); }
    .hint { font-size:12px; color:#9CA3AF; margin-top:4px; }
    .btn { padding:10px 20px; background:var(--color); color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; margin-top:12px; }
    .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .filter-btn { padding:5px 12px; border:2px solid #E5E7EB; background:#fff; border-radius:20px; font-size:13px; cursor:pointer; font-weight:600; color:#6B7280; }
    .filter-btn.active { border-color:var(--color); color:var(--color); }
    .bm-card { border:1px solid #F1F1F4; border-radius:8px; padding:14px 16px; margin-bottom:10px; }
    .bm-code { font-family:ui-monospace,Menlo,Consolas,monospace; font-weight:700; color:var(--color); }
    .bm-url { font-size:13px; color:#4B5563; word-break:break-all; }
    .bm-tags { margin-top:6px; }
    .tag { display:inline-block; background:#F3F4F6; color:#6B7280; font-size:11px; font-weight:700; padding:2px 8px; border-radius:12px; margin-right:5px; }
    .row-btn { background:none; border:1px solid #D1D5DB; border-radius:5px; padding:4px 9px; font-size:12px; font-weight:600; cursor:pointer; margin:8px 4px 0 0; }
    .row-btn.del { color:#DC2626; border-color:#FECACA; }
    .clicks { font-size:12px; color:#9CA3AF; font-weight:700; }
    .stats-bar { display:flex; gap:12px; flex-wrap:wrap; }
    .stat-box { background:#F9FAFB; border-radius:8px; padding:12px 16px; min-width:120px; }
    .stat-label { font-size:11px; color:#9CA3AF; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
    .stat-val { font-size:20px; font-weight:800; color:var(--color); margin-top:2px; }
    .empty-state { text-align:center; padding:32px; color:#9CA3AF; font-size:14px; }
  </style>
</head>
<body>

  <header>
    <h1>URL Shortener &amp; Bookmarks</h1>
    <p>Save and organise your links with short codes and tags — all stored locally in your browser</p>
  </header>

  <div class="container">

    <!-- FORM SECTION -->
    <div class="card">
      <h2>Save URL</h2>
      <div class="form-grid">

        <div style="grid-column:1/-1">
          <label for="url">Original URL</label>
          <input type="url" id="url" placeholder="https://example.com/very/long/url">
        </div>

        <div>
          <label for="alias">Custom Alias <span style="font-weight:400;color:#9CA3AF">(optional)</span></label>
          <input type="text" id="alias" placeholder="my-link">
          <div class="hint">Leave blank to auto-generate a short code.</div>
        </div>

        <div>
          <label for="tags">Tags <span style="font-weight:400;color:#9CA3AF">(optional)</span></label>
          <input type="text" id="tags" placeholder="work, design, reference">
          <div class="hint">Comma-separated list of tags.</div>
        </div>

      </div>
      <button class="btn" onclick="saveEntry()">Save URL</button>
    </div>

    <!-- LIST SECTION -->
    <div class="card">
      <h2>All Bookmarks</h2>

      <div class="filter-bar" id="tag-filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      </div>

      <div id="entries-list">
        <p class="empty-state">No entries yet &mdash; add one above.</p>
      </div>
    </div>

    <!-- STATS SECTION -->
    <div class="card">
      <h2>Summary</h2>
      <div class="stats-bar">
        <div class="stat-box">
          <div class="stat-label">Saved URLs</div>
          <div class="stat-val" id="total-count">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Total Clicks</div>
          <div class="stat-val" id="total-clicks">0</div>
        </div>
      </div>
    </div>

  </div><!-- /container -->

<script>
  // ─── Data storage ────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'ho15-url-shortener';
  let activeFilter = 'all';

  function loadEntries() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  }

  function saveEntries(entries) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => (
      { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
    ));
  }

  // ─── Generate a random short code ───────────────────────────────────────────
  function randomCode() {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let code = '';
    for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
    return code;
  }

  // ─── Save a new URL ──────────────────────────────────────────────────────────
  function saveEntry() {
    let url = document.getElementById('url').value.trim();
    const alias = document.getElementById('alias').value.trim();
    const tagsRaw = document.getElementById('tags').value.trim();

    if (!url) { alert('Please enter a URL.'); return; }

    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

    const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);

    const entries = loadEntries();
    let code = alias || randomCode();

    if (entries.some(e => e.code === code)) {
      alert('That alias / code is already taken. Try a different one.');
      return;
    }

    entries.push({ id: Date.now(), url, code, tags, clicks: 0, date: new Date().toLocaleDateString() });
    saveEntries(entries);

    document.getElementById('url').value = '';
    document.getElementById('alias').value = '';
    document.getElementById('tags').value = '';

    renderList();
  }

  // ─── Copy short link to clipboard ───────────────────────────────────────────
  function copyLink(code) {
    const link = location.origin + location.pathname + '#' + code;
    navigator.clipboard.writeText(link)
      .then(() => alert('Short link copied:\n' + link))
      .catch(() => prompt('Copy this link:', link));
  }

  // ─── Open URL and increment click count ─────────────────────────────────────
  function openURL(id) {
    const entries = loadEntries();
    const e = entries.find(x => x.id === id);
    if (!e) return;
    e.clicks = (e.clicks || 0) + 1;
    saveEntries(entries);
    renderList();
    window.open(e.url, '_blank');
  }

  // ─── Delete a bookmark ───────────────────────────────────────────────────────
  function deleteEntry(id) {
    if (!confirm('Delete this bookmark?')) return;
    saveEntries(loadEntries().filter(e => e.id !== id));
    renderList();
  }

  // ─── Filter by tag ───────────────────────────────────────────────────────────
  function setFilter(tag, btn) {
    activeFilter = tag;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }

  // ─── Re-render the tag filter buttons ────────────────────────────────────────
  function renderTagFilters(entries) {
    const bar = document.getElementById('tag-filters');
    const tags = [...new Set(entries.flatMap(e => e.tags || []))].sort();
    let html = `<button class="filter-btn ${activeFilter === 'all' ? 'active' : ''}" onclick="setFilter('all', this)">All</button>`;
    html += tags.map(t =>
      `<button class="filter-btn ${activeFilter === t ? 'active' : ''}" onclick="setFilter('${escapeHtml(t)}', this)">${escapeHtml(t)}</button>`
    ).join('');
    bar.innerHTML = html;
  }

  // ─── Render the bookmarks list ───────────────────────────────────────────────
  function renderList() {
    const entries = loadEntries();
    const container = document.getElementById('entries-list');

    renderTagFilters(entries);

    let visible = entries;
    if (activeFilter !== 'all') {
      visible = entries.filter(e => (e.tags || []).includes(activeFilter));
    }

    if (visible.length === 0) {
      container.innerHTML = '<p class="empty-state">No entries yet &mdash; add one above.</p>';
      updateStats(entries);
      return;
    }

    const sorted = visible.slice().sort((a, b) => b.id - a.id);

    container.innerHTML = sorted.map(e => `
      <div class="bm-card">
        <div><span class="bm-code">/${escapeHtml(e.code)}</span> &nbsp; <span class="clicks">${e.clicks || 0} clicks</span></div>
        <div class="bm-url">${escapeHtml(e.url)}</div>
        ${(e.tags && e.tags.length) ? `<div class="bm-tags">${e.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
        <div>
          <button class="row-btn" onclick="openURL(${e.id})">Open</button>
          <button class="row-btn" onclick="copyLink('${escapeHtml(e.code)}')">Copy link</button>
          <button class="row-btn del" onclick="deleteEntry(${e.id})">Delete</button>
        </div>
      </div>`).join('');

    updateStats(entries);
  }

  // ─── Update summary stats ────────────────────────────────────────────────────
  function updateStats(entries) {
    document.getElementById('total-count').textContent = entries.length;
    const totalClicks = entries.reduce((sum, e) => sum + (e.clicks || 0), 0);
    document.getElementById('total-clicks').textContent = totalClicks;
  }

  // ─── Initialise ──────────────────────────────────────────────────────────────
  renderList();
</script>

</body>
</html>
