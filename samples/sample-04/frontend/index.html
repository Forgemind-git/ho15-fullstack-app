<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <style>
    :root {
      --bg: #faf5ff;
      --surface: #ffffff;
      --primary: #7c3aed;
      --primary-hover: #6d28d9;
      --text: #1e1b4b;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --radius: 10px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--primary); color: #fff; padding: 20px 32px; }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p { font-size: 0.875rem; opacity: 0.85; margin-top: 2px; }
    main { max-width: 720px; margin: 0 auto; padding: 32px 16px; display: grid; gap: 24px; }
    .card { background: var(--surface); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
    .input-row { display: flex; gap: 10px; }
    input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; color: var(--text); outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--primary); }
    .btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-copy { background: #ede9fe; color: var(--primary); border: 1px solid #c4b5fd; }
    .btn-copy:hover { background: #ddd6fe; }
    .result-box { background: #faf5ff; border: 1px solid #c4b5fd; border-radius: 8px; padding: 14px 16px; margin-top: 14px; display: none; }
    .result-box .label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
    .result-box .short-link { font-size: 1.05rem; font-weight: 700; color: var(--primary); word-break: break-all; }
    .result-box .copy-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .links-list { display: grid; gap: 10px; }
    .link-item { border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
    .link-item .original { font-size: 0.8rem; color: var(--text-muted); word-break: break-all; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .link-item .short { font-weight: 600; font-size: 0.9rem; }
    .link-item .short a { color: var(--primary); text-decoration: none; }
    .link-item .short a:hover { text-decoration: underline; }
    .link-item .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
    .clicks { display: inline-flex; align-items: center; gap: 4px; background: #ede9fe; color: var(--primary); border-radius: 12px; padding: 2px 10px; font-size: 0.75rem; font-weight: 600; }
    .link-date { font-size: 0.72rem; color: var(--text-muted); }
    .empty { text-align: center; color: var(--text-muted); padding: 32px; font-size: 0.9rem; }
    #toast { position: fixed; bottom: 24px; right: 24px; background: #1e1b4b; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 0.85rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
<header>
  <h1>URL Shortener</h1>
  <p>Shorten any URL and track clicks</p>
</header>
<main>
  <div class="card">
    <h2>Shorten a URL</h2>
    <form id="shortenForm">
      <div class="input-row">
        <input type="text" id="urlInput" placeholder="https://example.com/very/long/url..." required />
        <button type="submit" class="btn btn-primary">Shorten</button>
      </div>
    </form>
    <div class="result-box" id="resultBox">
      <div class="label">Your short link:</div>
      <div class="short-link" id="shortLinkDisplay"></div>
      <div class="copy-row">
        <button class="btn btn-copy" onclick="copyLink()">Copy Link</button>
        <span id="copyConfirm" style="font-size:0.8rem;color:var(--primary);display:none">Copied!</span>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Your Links</h2>
    <div class="links-list" id="linksList"></div>
    <p class="empty" id="emptyMsg" style="display:none">No links yet. Shorten one above!</p>
  </div>
</main>
<div id="toast"></div>

<script>
  let lastShortUrl = '';

  async function loadLinks() {
    const res = await fetch('/api/links');
    const links = await res.json();
    const list = document.getElementById('linksList');
    const empty = document.getElementById('emptyMsg');
    if (!links.length) { list.innerHTML = ''; empty.style.display = ''; return; }
    empty.style.display = 'none';
    const base = window.location.origin;
    list.innerHTML = links.map(l => `
      <div class="link-item">
        <div class="original" title="${escHtml(l.original_url)}">${escHtml(l.original_url)}</div>
        <div class="meta">
          <div class="short"><a href="/${l.short_code}" target="_blank">${base}/${l.short_code}</a></div>
          <div style="display:flex;gap:10px;align-items:center;">
            <span class="clicks">&#128065; ${l.click_count} click${l.click_count !== 1 ? 's' : ''}</span>
            <span class="link-date">${new Date(l.created_at).toLocaleDateString()}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('shortenForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const url = document.getElementById('urlInput').value.trim();
    const res = await fetch('/api/shorten', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    const data = await res.json();
    if (res.ok) {
      lastShortUrl = data.short_url;
      document.getElementById('shortLinkDisplay').textContent = lastShortUrl;
      document.getElementById('resultBox').style.display = '';
      document.getElementById('copyConfirm').style.display = 'none';
      document.getElementById('urlInput').value = '';
      showToast('URL shortened!');
      loadLinks();
    } else {
      showToast(data.error || 'Error shortening URL');
    }
  });

  function copyLink() {
    navigator.clipboard.writeText(lastShortUrl).then(() => {
      const el = document.getElementById('copyConfirm');
      el.style.display = '';
      setTimeout(() => el.style.display = 'none', 2000);
    });
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  loadLinks();
</script>
</body>
</html>
