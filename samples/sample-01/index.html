<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker App — HO15</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#F8F9FA; color:#1a1a2e; min-height:100vh; }
:root { --color:#BE185D; }
.banner { background:#FEF3C7; border-left:4px solid #D97706; padding:10px 20px; font-size:13px; color:#92400E; text-align:center; }
header { background:var(--color); color:#fff; padding:24px 32px; }
header h1 { font-size:22px; font-weight:800; margin-bottom:4px; }
header p { font-size:14px; opacity:.85; }
.container { max-width:900px; margin:0 auto; padding:24px 16px; }
.card { background:#fff; border-radius:10px; box-shadow:0 1px 6px rgba(0,0,0,.08); padding:24px; margin-bottom:20px; }
.card h2 { font-size:16px; font-weight:700; margin-bottom:16px; color:var(--color); }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:600px){ .form-grid{ grid-template-columns:1fr; } }
label { font-size:13px; font-weight:600; color:#374151; display:block; margin-bottom:4px; }
input, select { width:100%; padding:9px 12px; border:1px solid #D1D5DB; border-radius:6px; font-size:14px; outline:none; transition:border .2s; }
input:focus, select:focus { border-color:var(--color); }
.btn { padding:10px 20px; background:var(--color); color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; }
.btn:hover { opacity:.88; }
.filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.filter-btn { padding:6px 14px; border:2px solid #E5E7EB; background:#fff; border-radius:20px; font-size:13px; cursor:pointer; font-weight:600; color:#6B7280; }
.filter-btn.active { border-color:var(--color); color:var(--color); background:#FDF2F8; }
table { width:100%; border-collapse:collapse; }
th { text-align:left; font-size:12px; font-weight:700; color:#9CA3AF; text-transform:uppercase; letter-spacing:.05em; padding:8px 10px; border-bottom:2px solid #F3F4F6; }
td { padding:11px 10px; font-size:14px; border-bottom:1px solid #F9FAFB; }
tr:last-child td { border-bottom:none; }
.cat-badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:12px; font-weight:600; }
.cat-Food { background:#FEF3C7; color:#D97706; }
.cat-Transport { background:#DBEAFE; color:#1D4ED8; }
.cat-Work { background:#D1FAE5; color:#065F46; }
.cat-Other { background:#F3F4F6; color:#6B7280; }
.del-btn { background:none; border:none; color:#EF4444; cursor:pointer; font-size:16px; padding:2px 6px; }
.del-btn:hover { background:#FEF2F2; border-radius:4px; }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
.stat-card { background:#F9FAFB; border-radius:8px; padding:14px 16px; }
.stat-label { font-size:12px; color:#9CA3AF; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
.stat-val { font-size:22px; font-weight:800; color:var(--color); margin-top:4px; }
.empty { text-align:center; padding:32px; color:#9CA3AF; font-size:14px; }
</style>
</head>
<body>
<div class="banner">📁 Data saved in your browser (localStorage) — clears if you clear browser data</div>
<header>
  <h1>💰 Expense Tracker App</h1>
  <p>Track your spending by category — all data stored locally in your browser</p>
</header>
<div class="container">
  <!-- Add Expense Form -->
  <div class="card">
    <h2>Add Expense</h2>
    <div class="form-grid">
      <div>
        <label>Description</label>
        <input type="text" id="desc" placeholder="e.g. Coffee, Taxi, Software…">
      </div>
      <div>
        <label>Amount (₹)</label>
        <input type="number" id="amount" placeholder="0.00" min="0" step="0.01">
      </div>
      <div>
        <label>Category</label>
        <select id="category">
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Work">Work</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div>
        <label>Date</label>
        <input type="date" id="date">
      </div>
    </div>
    <br>
    <button class="btn" onclick="addExpense()">+ Add Expense</button>
  </div>

  <!-- Expense List -->
  <div class="card">
    <h2>All Expenses</h2>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('All',this)">All</button>
      <button class="filter-btn" onclick="setFilter('Food',this)">Food</button>
      <button class="filter-btn" onclick="setFilter('Transport',this)">Transport</button>
      <button class="filter-btn" onclick="setFilter('Work',this)">Work</button>
      <button class="filter-btn" onclick="setFilter('Other',this)">Other</button>
    </div>
    <div id="list-wrap"></div>
  </div>

  <!-- Summary -->
  <div class="card">
    <h2>Summary by Category</h2>
    <div class="stats-grid" id="stats"></div>
  </div>
</div>

<script>
const KEY = 'ho15_expenses';
let filter = 'All';

function load() { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

document.getElementById('date').value = new Date().toISOString().split('T')[0];

function addExpense() {
  const desc = document.getElementById('desc').value.trim();
  const amount = parseFloat(document.getElementById('amount').value);
  const category = document.getElementById('category').value;
  const date = document.getElementById('date').value;
  if (!desc || !amount || amount <= 0 || !date) { alert('Please fill all fields with valid values.'); return; }
  const data = load();
  data.unshift({ id: Date.now(), desc, amount, category, date });
  save(data);
  document.getElementById('desc').value = '';
  document.getElementById('amount').value = '';
  render();
}

function deleteExpense(id) {
  if (!confirm('Delete this expense?')) return;
  save(load().filter(e => e.id !== id));
  render();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function fmt(n) { return '₹' + n.toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2}); }

function render() {
  const data = load();
  const filtered = filter === 'All' ? data : data.filter(e => e.category === filter);
  const wrap = document.getElementById('list-wrap');
  if (filtered.length === 0) {
    wrap.innerHTML = '<div class="empty">No expenses found. Add one above!</div>';
  } else {
    wrap.innerHTML = `<table>
      <thead><tr><th>Description</th><th>Category</th><th>Date</th><th>Amount</th><th></th></tr></thead>
      <tbody>${filtered.map(e => `
        <tr>
          <td>${e.desc}</td>
          <td><span class="cat-badge cat-${e.category}">${e.category}</span></td>
          <td>${e.date}</td>
          <td><strong>${fmt(e.amount)}</strong></td>
          <td><button class="del-btn" onclick="deleteExpense(${e.id})" title="Delete">🗑</button></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }

  // Stats
  const cats = ['Food','Transport','Work','Other'];
  const totals = {};
  cats.forEach(c => totals[c] = 0);
  data.forEach(e => { totals[e.category] = (totals[e.category] || 0) + e.amount; });
  const grandTotal = data.reduce((s,e) => s + e.amount, 0);
  const statsEl = document.getElementById('stats');
  statsEl.innerHTML = cats.map(c => `
    <div class="stat-card">
      <div class="stat-label">${c}</div>
      <div class="stat-val">${fmt(totals[c])}</div>
    </div>`).join('') + `
    <div class="stat-card" style="background:#FDF2F8;">
      <div class="stat-label">Grand Total</div>
      <div class="stat-val">${fmt(grandTotal)}</div>
    </div>`;
}

render();
</script>
</body>
</html>
