<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking App — HO15</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#F8F9FA; color:#1a1a2e; min-height:100vh; }
    :root { --color:#BE185D; }
    header { background:var(--color); color:#fff; padding:24px 32px; }
    header h1 { font-size:22px; font-weight:800; margin-bottom:4px; }
    header p { font-size:14px; opacity:.85; }
    .container { max-width:900px; margin:0 auto; padding:24px 16px; }
    .card { background:#fff; border-radius:10px; box-shadow:0 1px 6px rgba(0,0,0,.08); padding:24px; margin-bottom:20px; }
    .card h2 { font-size:16px; font-weight:700; margin-bottom:16px; color:var(--color); }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:600px){ .form-grid{ grid-template-columns:1fr; } }
    label { font-size:13px; font-weight:600; color:#374151; display:block; margin-bottom:4px; }
    input, select { width:100%; padding:9px 12px; border:1px solid #D1D5DB; border-radius:6px; font-size:14px; outline:none; }
    input:focus, select:focus { border-color:var(--color); }
    .btn { padding:10px 20px; background:var(--color); color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; margin-top:12px; }
    .conflict-warn { background:#FEF2F2; border:1px solid #FECACA; color:#DC2626; padding:12px 16px; border-radius:6px; font-size:14px; margin-top:12px; display:none; }
    .stats-bar { display:flex; gap:12px; flex-wrap:wrap; }
    .stat-box { background:#F9FAFB; border-radius:8px; padding:12px 16px; min-width:120px; }
    .stat-label { font-size:11px; color:#9CA3AF; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
    .stat-val { font-size:20px; font-weight:800; color:var(--color); margin-top:2px; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:10px 8px; font-size:14px; border-bottom:1px solid #F1F1F4; vertical-align:middle; }
    th { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:#9CA3AF; }
    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:700; }
    .b-Pending { background:#FEF3C7; color:#92400E; }
    .b-Confirmed { background:#DCFCE7; color:#166534; }
    .b-Cancelled { background:#FEE2E2; color:#991B1B; }
    .row-btn { background:none; border:1px solid #D1D5DB; border-radius:5px; padding:4px 9px; font-size:12px; font-weight:600; cursor:pointer; margin:2px 4px 2px 0; }
    .row-btn.del { color:#DC2626; border-color:#FECACA; }
    .empty-state { text-align:center; padding:32px; color:#9CA3AF; font-size:14px; }
  </style>
</head>
<body>

  <header>
    <h1>Booking App</h1>
    <p>Manage service bookings with conflict detection — all data stored locally in your browser</p>
  </header>

  <div class="container">

    <!-- FORM SECTION -->
    <div class="card">
      <h2>Submit Booking</h2>
      <div class="form-grid">

        <div>
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Client full name">
        </div>

        <div>
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="email@example.com">
        </div>

        <div>
          <label for="service">Service</label>
          <input type="text" id="service" placeholder="e.g. Consultation, Hair Cut...">
        </div>

        <div>
          <label for="bdate">Date</label>
          <input type="date" id="bdate">
        </div>

        <div>
          <label for="btime">Time</label>
          <input type="time" id="btime">
        </div>

      </div>

      <div class="conflict-warn" id="conflict-warn">
        Conflict detected! A booking already exists for this date and time.
      </div>

      <button class="btn" onclick="saveEntry()">Submit Booking</button>
    </div>

    <!-- LIST SECTION -->
    <div class="card">
      <h2>All Bookings</h2>
      <div id="entries-list">
        <p class="empty-state">No entries yet &mdash; add one above.</p>
      </div>
    </div>

    <!-- STATS SECTION -->
    <div class="card">
      <h2>Summary</h2>
      <div class="stats-bar">
        <div class="stat-box">
          <div class="stat-label">Total</div>
          <div class="stat-val" id="total-count">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Pending</div>
          <div class="stat-val" id="pending-count">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Confirmed</div>
          <div class="stat-val" id="confirmed-count">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Cancelled</div>
          <div class="stat-val" id="cancelled-count">0</div>
        </div>
      </div>
    </div>

  </div><!-- /container -->

<script>
  // ─── Data storage ────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'ho15-booking-app';

  function loadEntries() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  }

  function saveEntries(entries) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => (
      { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
    ));
  }

  function hasConflict(date, time, ignoreId) {
    return loadEntries().some(e =>
      e.date === date && e.time === time && e.status !== 'Cancelled' && e.id !== ignoreId
    );
  }

  // ─── Save a new booking ──────────────────────────────────────────────────────
  function saveEntry() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const service = document.getElementById('service').value.trim();
    const date = document.getElementById('bdate').value;
    const time = document.getElementById('btime').value;

    if (!name || !email || !service || !date || !time) {
      alert('Please fill in all fields.');
      return;
    }

    if (hasConflict(date, time)) {
      alert('Conflict! A booking already exists for ' + date + ' at ' + time + '.');
      return;
    }

    const entry = { id: Date.now(), name, email, service, date, time, status: 'Pending' };

    const entries = loadEntries();
    entries.push(entry);
    saveEntries(entries);

    document.getElementById('name').value = '';
    document.getElementById('email').value = '';
    document.getElementById('service').value = '';
    document.getElementById('conflict-warn').style.display = 'none';

    renderList();
  }

  // ─── Render the booking list ─────────────────────────────────────────────────
  function renderList() {
    const entries = loadEntries();
    const container = document.getElementById('entries-list');

    if (entries.length === 0) {
      container.innerHTML = '<p class="empty-state">No entries yet &mdash; add one above.</p>';
      updateStats(entries);
      return;
    }

    const sorted = entries.slice().sort((a, b) =>
      (a.date + a.time).localeCompare(b.date + b.time)
    );

    const rows = sorted.map(e => `
      <tr>
        <td>${escapeHtml(e.name)}<br><span style="color:#9CA3AF;font-size:12px;">${escapeHtml(e.email)}</span></td>
        <td>${escapeHtml(e.service)}</td>
        <td>${escapeHtml(e.date)}<br>${escapeHtml(e.time)}</td>
        <td><span class="badge b-${e.status}">${e.status}</span></td>
        <td>
          ${e.status !== 'Confirmed' ? `<button class="row-btn" onclick="updateStatus(${e.id},'Confirmed')">Confirm</button>` : ''}
          ${e.status !== 'Cancelled' ? `<button class="row-btn" onclick="updateStatus(${e.id},'Cancelled')">Cancel</button>` : ''}
          <button class="row-btn" onclick="copyConfirmation(${e.id})">Copy text</button>
          <button class="row-btn del" onclick="deleteEntry(${e.id})">Delete</button>
        </td>
      </tr>`).join('');

    container.innerHTML = `
      <table>
        <thead><tr><th>Client</th><th>Service</th><th>When</th><th>Status</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;

    updateStats(entries);
  }

  // ─── Update status (Confirmed / Cancelled) ───────────────────────────────────
  function updateStatus(id, status) {
    const entries = loadEntries();
    const entry = entries.find(e => e.id === id);
    if (!entry) return;
    entry.status = status;
    saveEntries(entries);
    renderList();
  }

  // ─── Delete a booking ────────────────────────────────────────────────────────
  function deleteEntry(id) {
    if (!confirm('Delete this booking?')) return;
    saveEntries(loadEntries().filter(e => e.id !== id));
    renderList();
  }

  // ─── Copy confirmation text to clipboard ─────────────────────────────────────
  function copyConfirmation(id) {
    const e = loadEntries().find(x => x.id === id);
    if (!e) return;
    const text = `Hi ${e.name}, your ${e.service} booking on ${e.date} at ${e.time} is confirmed. See you then!`;
    navigator.clipboard.writeText(text)
      .then(() => alert('Confirmation text copied to clipboard:\n\n' + text))
      .catch(() => prompt('Copy this text:', text));
  }

  // ─── Update summary stats ────────────────────────────────────────────────────
  function updateStats(entries) {
    document.getElementById('total-count').textContent = entries.length;
    document.getElementById('pending-count').textContent = entries.filter(e => e.status === 'Pending').length;
    document.getElementById('confirmed-count').textContent = entries.filter(e => e.status === 'Confirmed').length;
    document.getElementById('cancelled-count').textContent = entries.filter(e => e.status === 'Cancelled').length;
  }

  // ─── Live conflict check on date/time change ─────────────────────────────────
  function checkConflictLive() {
    const date = document.getElementById('bdate').value;
    const time = document.getElementById('btime').value;
    const warn = document.getElementById('conflict-warn');
    warn.style.display = (date && time && hasConflict(date, time)) ? 'block' : 'none';
  }
  document.getElementById('bdate').addEventListener('change', checkConflictLive);
  document.getElementById('btime').addEventListener('change', checkConflictLive);

  // ─── Initialise ──────────────────────────────────────────────────────────────
  document.getElementById('bdate').value = new Date().toISOString().split('T')[0];
  document.getElementById('btime').value = '10:00';

  renderList();
</script>

</body>
</html>
