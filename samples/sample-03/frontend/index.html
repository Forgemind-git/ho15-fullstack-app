<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Collector</title>
  <style>
    :root {
      --bg: #f0fdf4;
      --surface: #ffffff;
      --primary: #16a34a;
      --primary-hover: #15803d;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 10px;
      --shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--primary); color: #fff; padding: 20px 32px; }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p { font-size: 0.875rem; opacity: 0.85; margin-top: 2px; }
    main { max-width: 960px; margin: 0 auto; padding: 32px 16px; display: grid; gap: 24px; }
    .card { background: var(--surface); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
    .form-field { margin-bottom: 14px; }
    label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; }
    label .required { color: #ef4444; margin-left: 2px; }
    input, select, textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; color: var(--text); background: #fff; outline: none; transition: border-color 0.2s; font-family: inherit; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 90px; }
    .btn { padding: 9px 24px; border: none; border-radius: 6px; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 16px; }
    .tab { padding: 8px 16px; font-size: 0.875rem; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .sub-list { display: grid; gap: 10px; }
    .sub-item { border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; cursor: pointer; transition: border-color 0.2s; }
    .sub-item:hover { border-color: var(--primary); }
    .sub-item .sub-id { font-size: 0.72rem; color: var(--text-muted); }
    .sub-item .sub-date { font-size: 0.8rem; color: var(--text-muted); }
    .sub-item .sub-preview { font-size: 0.85rem; margin-top: 4px; }
    .json-viewer { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 16px; font-family: 'Courier New', monospace; font-size: 0.82rem; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; }
    .back-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; font-size: 0.8rem; cursor: pointer; color: var(--text-muted); margin-bottom: 14px; transition: border-color 0.2s; }
    .back-btn:hover { border-color: var(--primary); color: var(--primary); }
    .stats { display: flex; gap: 16px; margin-bottom: 16px; }
    .stat { background: #f0fdf4; border-radius: 8px; padding: 10px 16px; font-size: 0.85rem; }
    .stat span { font-weight: 700; color: var(--primary); }
    .empty { text-align: center; color: var(--text-muted); padding: 32px; font-size: 0.9rem; }
    #toast { position: fixed; bottom: 24px; right: 24px; background: #0f172a; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 0.85rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
<header>
  <h1>Form Collector</h1>
  <p>Configurable form with JSON submission storage</p>
</header>
<main>
  <div class="card">
    <h2 id="formTitle">Loading form...</h2>
    <form id="dynamicForm">
      <div id="formFields"></div>
      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" data-tab="list" onclick="switchTab('list')">Submissions</button>
      <button class="tab" data-tab="detail" onclick="switchTab('detail')" id="detailTab" style="display:none">View Submission</button>
    </div>
    <div id="listView">
      <div class="stats"><div class="stat">Total: <span id="totalCount">0</span></div></div>
      <div class="sub-list" id="subList"></div>
      <p class="empty" id="emptyMsg" style="display:none">No submissions yet</p>
    </div>
    <div id="detailView" style="display:none">
      <button class="back-btn" onclick="switchTab('list')">&#8592; Back to list</button>
      <div class="json-viewer" id="jsonViewer"></div>
    </div>
  </div>
</main>
<div id="toast"></div>

<script>
  let formConfig = null;
  let activeTab = 'list';

  async function init() {
    const res = await fetch('/api/config');
    formConfig = await res.json();
    renderForm();
    loadSubmissions();
  }

  function renderForm() {
    document.getElementById('formTitle').textContent = formConfig.formTitle;
    const container = document.getElementById('formFields');
    container.innerHTML = formConfig.fields.map(field => {
      const req = field.required ? '<span class="required">*</span>' : '';
      let input = '';
      if (field.type === 'textarea') {
        input = `<textarea id="${field.id}" name="${field.id}" placeholder="${field.placeholder || ''}" ${field.required ? 'required' : ''}></textarea>`;
      } else if (field.type === 'select') {
        const opts = (field.options || []).map(o => `<option value="${escHtml(o)}">${escHtml(o)}</option>`).join('');
        input = `<select id="${field.id}" name="${field.id}" ${field.required ? 'required' : ''}><option value="">Select...</option>${opts}</select>`;
      } else {
        input = `<input type="${field.type}" id="${field.id}" name="${field.id}" placeholder="${field.placeholder || ''}" ${field.required ? 'required' : ''} />`;
      }
      return `<div class="form-field"><label for="${field.id}">${escHtml(field.label)}${req}</label>${input}</div>`;
    }).join('');
  }

  async function loadSubmissions() {
    const res = await fetch('/api/submissions');
    const { submissions, total } = await res.json();
    document.getElementById('totalCount').textContent = total;
    const list = document.getElementById('subList');
    const empty = document.getElementById('emptyMsg');
    if (!submissions.length) { list.innerHTML = ''; empty.style.display = ''; return; }
    empty.style.display = 'none';
    list.innerHTML = submissions.map(s => {
      const preview = Object.entries(s.data).slice(0, 2).map(([k, v]) => `${k}: ${v}`).join(' | ');
      return `<div class="sub-item" onclick="viewSubmission(${s.id})">
        <div style="display:flex;justify-content:space-between;">
          <div class="sub-id">#${s.id}</div>
          <div class="sub-date">${new Date(s.created_at).toLocaleString()}</div>
        </div>
        <div class="sub-preview">${escHtml(preview)}</div>
      </div>`;
    }).join('');
  }

  async function viewSubmission(id) {
    const res = await fetch(`/api/submissions/${id}`);
    const sub = await res.json();
    const viewer = document.getElementById('jsonViewer');
    viewer.textContent = JSON.stringify(sub, null, 2);
    document.getElementById('detailTab').style.display = '';
    switchTab('detail');
  }

  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.getElementById('listView').style.display = tab === 'list' ? '' : 'none';
    document.getElementById('detailView').style.display = tab === 'detail' ? '' : 'none';
    if (tab === 'list') document.getElementById('detailTab').style.display = 'none';
  }

  document.getElementById('dynamicForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {};
    if (formConfig) {
      formConfig.fields.forEach(field => {
        const el = document.getElementById(field.id);
        if (el && el.value.trim()) data[field.id] = el.value.trim();
      });
    }
    const res = await fetch('/api/submissions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (res.ok) {
      showToast('Submission saved!');
      document.getElementById('dynamicForm').reset();
      loadSubmissions();
    } else {
      const err = await res.json();
      showToast(err.error || 'Error submitting form');
    }
  });

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  init();
</script>
</body>
</html>
