<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Collector — HO15</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#F8F9FA; color:#1a1a2e; min-height:100vh; }
    :root { --color:#BE185D; }
    header { background:var(--color); color:#fff; padding:24px 32px; }
    header h1 { font-size:22px; font-weight:800; margin-bottom:4px; }
    header p { font-size:14px; opacity:.85; }
    .container { max-width:900px; margin:0 auto; padding:24px 16px; }
    .card { background:#fff; border-radius:10px; box-shadow:0 1px 6px rgba(0,0,0,.08); padding:24px; margin-bottom:20px; }
    .card-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .card h2 { font-size:16px; font-weight:700; color:var(--color); }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:600px){ .form-grid{ grid-template-columns:1fr; } }
    label { font-size:13px; font-weight:600; color:#374151; display:block; margin-bottom:4px; }
    input, textarea, select { width:100%; padding:9px 12px; border:1px solid #D1D5DB; border-radius:6px; font-size:14px; outline:none; }
    input:focus, textarea:focus, select:focus { border-color:var(--color); }
    textarea { resize:vertical; min-height:80px; }
    .btn { padding:10px 20px; background:var(--color); color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; margin-top:12px; }
    .btn-sm { padding:6px 12px; font-size:12px; margin-top:0; }
    .btn-ghost { background:#fff; color:var(--color); border:1px solid var(--color); }
    .sub-card { border:1px solid #F1F1F4; border-radius:8px; padding:14px 16px; margin-bottom:10px; }
    .sub-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .sub-name { font-weight:700; font-size:14px; }
    .sub-meta { font-size:12px; color:#9CA3AF; }
    .stars { color:#F59E0B; font-size:14px; }
    .del-btn { background:none; border:none; color:#DC2626; cursor:pointer; font-size:13px; font-weight:600; }
    .stats-bar { display:flex; gap:12px; flex-wrap:wrap; }
    .stat-box { background:#F9FAFB; border-radius:8px; padding:12px 16px; min-width:120px; }
    .stat-label { font-size:11px; color:#9CA3AF; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
    .stat-val { font-size:20px; font-weight:800; color:var(--color); margin-top:2px; }
    .empty-state { text-align:center; padding:32px; color:#9CA3AF; font-size:14px; }
  </style>
</head>
<body>

  <header>
    <h1>Form Collector</h1>
    <p>Collect feedback and sign-ups — all data stored locally in your browser</p>
  </header>

  <div class="container">

    <!-- FORM SECTION -->
    <div class="card">
      <h2 style="margin-bottom:16px;">Submit Form</h2>
      <div class="form-grid">

        <div>
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Your name">
        </div>

        <div>
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com">
        </div>

        <div style="grid-column:1/-1">
          <label for="message">Message</label>
          <textarea id="message" placeholder="Your message or feedback..."></textarea>
        </div>

        <div>
          <label for="rating">Rating (1-5)</label>
          <select id="rating">
            <option value="">-- select rating --</option>
            <option value="1">1 — Poor</option>
            <option value="2">2 — Fair</option>
            <option value="3">3 — Good</option>
            <option value="4">4 — Very good</option>
            <option value="5">5 — Excellent</option>
          </select>
        </div>

      </div>
      <button class="btn" onclick="saveEntry()">Submit Form</button>
    </div>

    <!-- LIST SECTION -->
    <div class="card">
      <div class="card-head">
        <h2>All Submissions</h2>
        <button class="btn btn-sm btn-ghost" onclick="exportCSV()">Export CSV</button>
      </div>

      <div style="margin-bottom:16px;">
        <input type="text" id="search" placeholder="Search by name, email, or message..." oninput="renderList()">
      </div>

      <div id="entries-list">
        <p class="empty-state">No entries yet &mdash; add one above.</p>
      </div>
    </div>

    <!-- STATS SECTION -->
    <div class="card">
      <h2 style="margin-bottom:16px;">Summary</h2>
      <div class="stats-bar">
        <div class="stat-box">
          <div class="stat-label">Total Submissions</div>
          <div class="stat-val" id="total-count">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Avg Rating</div>
          <div class="stat-val" id="avg-rating">-</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">5-Star</div>
          <div class="stat-val" id="five-count">0</div>
        </div>
      </div>
    </div>

  </div><!-- /container -->

<script>
  // ─── Data storage ────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'ho15-form-collector';

  function loadEntries() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  }

  function saveEntries(entries) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => (
      { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
    ));
  }

  // ─── Save a new submission ───────────────────────────────────────────────────
  function saveEntry() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const message = document.getElementById('message').value.trim();
    const rating = document.getElementById('rating').value;

    if (!name || !email || !message || !rating) {
      alert('Please fill in all fields.');
      return;
    }

    const entry = {
      id: Date.now(),
      name, email, message,
      rating: parseInt(rating, 10),
      date: new Date().toLocaleString()
    };

    const entries = loadEntries();
    entries.push(entry);
    saveEntries(entries);

    document.getElementById('name').value = '';
    document.getElementById('email').value = '';
    document.getElementById('message').value = '';
    document.getElementById('rating').value = '';

    renderList();
  }

  // ─── Render the submissions list ─────────────────────────────────────────────
  function renderList() {
    const entries = loadEntries();
    const container = document.getElementById('entries-list');
    const query = document.getElementById('search').value.trim().toLowerCase();

    let visible = entries;
    if (query) {
      visible = entries.filter(e =>
        e.name.toLowerCase().includes(query) ||
        e.email.toLowerCase().includes(query) ||
        e.message.toLowerCase().includes(query)
      );
    }

    if (visible.length === 0) {
      container.innerHTML = `<p class="empty-state">${query ? 'No results match your search.' : 'No entries yet &mdash; add one above.'}</p>`;
      updateStats(entries);
      return;
    }

    const sorted = visible.slice().sort((a, b) => b.id - a.id);

    container.innerHTML = sorted.map(e => `
      <div class="sub-card">
        <div class="sub-top">
          <div>
            <div class="sub-name">${escapeHtml(e.name)}</div>
            <div class="sub-meta">${escapeHtml(e.email)} &middot; ${escapeHtml(e.date)}</div>
          </div>
          <div class="stars">${'★'.repeat(e.rating)}${'☆'.repeat(5 - e.rating)}</div>
        </div>
        <div style="font-size:14px; margin:6px 0;">${escapeHtml(e.message)}</div>
        <button class="del-btn" onclick="deleteEntry(${e.id})">Delete</button>
      </div>`).join('');

    updateStats(entries);
  }

  // ─── Delete an entry ────────────────────────────────────────────────────────
  function deleteEntry(id) {
    if (!confirm('Delete this submission?')) return;
    saveEntries(loadEntries().filter(e => e.id !== id));
    renderList();
  }

  // ─── Update summary stats ────────────────────────────────────────────────────
  function updateStats(entries) {
    document.getElementById('total-count').textContent = entries.length;

    if (entries.length === 0) {
      document.getElementById('avg-rating').textContent = '-';
      document.getElementById('five-count').textContent = '0';
      return;
    }

    const avg = entries.reduce((s, e) => s + e.rating, 0) / entries.length;
    document.getElementById('avg-rating').textContent = avg.toFixed(1);
    document.getElementById('five-count').textContent = entries.filter(e => e.rating === 5).length;
  }

  // ─── Export to CSV ───────────────────────────────────────────────────────────
  function exportCSV() {
    const entries = loadEntries();
    if (entries.length === 0) { alert('No submissions to export yet.'); return; }

    const header = ['Name', 'Email', 'Message', 'Rating', 'Date'];
    const lines = entries.map(e =>
      [e.name, e.email, e.message, e.rating, e.date]
        .map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')
    );
    const csv = [header.join(','), ...lines].join('\n');

    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'submissions.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  // ─── Initialise ─────────────────────────────────────────────────────────────
  renderList();
</script>

</body>
</html>
