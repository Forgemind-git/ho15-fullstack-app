<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave Request Tracker — HO15</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#F8F9FA; color:#1a1a2e; min-height:100vh; }
    :root { --color:#BE185D; }
    header { background:var(--color); color:#fff; padding:24px 32px; }
    header h1 { font-size:22px; font-weight:800; margin-bottom:4px; }
    header p { font-size:14px; opacity:.85; }
    .container { max-width:960px; margin:0 auto; padding:24px 16px; }
    .card { background:#fff; border-radius:10px; box-shadow:0 1px 6px rgba(0,0,0,.08); padding:24px; margin-bottom:20px; }
    .card h2 { font-size:16px; font-weight:700; margin-bottom:16px; color:var(--color); }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:600px){ .form-grid{ grid-template-columns:1fr; } }
    label { font-size:13px; font-weight:600; color:#374151; display:block; margin-bottom:4px; }
    input, select, textarea { width:100%; padding:9px 12px; border:1px solid #D1D5DB; border-radius:6px; font-size:14px; outline:none; }
    input:focus, select:focus, textarea:focus { border-color:var(--color); }
    textarea { resize:vertical; min-height:60px; }
    .btn { padding:10px 20px; background:var(--color); color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; margin-top:12px; }
    .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .filter-btn { padding:6px 14px; border:2px solid #E5E7EB; background:#fff; border-radius:20px; font-size:13px; cursor:pointer; font-weight:600; color:#6B7280; }
    .filter-btn.active { border-color:var(--color); color:var(--color); }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:10px 8px; font-size:14px; border-bottom:1px solid #F1F1F4; vertical-align:top; }
    th { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:#9CA3AF; }
    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:700; }
    .b-pending { background:#FEF3C7; color:#92400E; }
    .b-approved { background:#DCFCE7; color:#166534; }
    .b-rejected { background:#FEE2E2; color:#991B1B; }
    .row-btn { background:none; border:1px solid #D1D5DB; border-radius:5px; padding:4px 9px; font-size:12px; font-weight:600; cursor:pointer; margin:2px 4px 2px 0; }
    .row-btn.del { color:#DC2626; border-color:#FECACA; }
    .stats-bar { display:flex; gap:12px; flex-wrap:wrap; }
    .stat-box { background:#F9FAFB; border-radius:8px; padding:12px 16px; min-width:120px; }
    .stat-label { font-size:11px; color:#9CA3AF; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
    .stat-val { font-size:20px; font-weight:800; color:var(--color); margin-top:2px; }
    .empty-state { text-align:center; padding:32px; color:#9CA3AF; font-size:14px; }
  </style>
</head>
<body>

  <header>
    <h1>Leave Request Tracker</h1>
    <p>Submit and manage employee leave requests — all data stored locally in your browser</p>
  </header>

  <div class="container">

    <!-- FORM SECTION -->
    <div class="card">
      <h2>Submit Leave Request</h2>
      <div class="form-grid">

        <div>
          <label for="empname">Employee Name</label>
          <input type="text" id="empname" placeholder="Full name">
        </div>

        <div>
          <label for="ltype">Leave Type</label>
          <select id="ltype">
            <option value="">-- select type --</option>
            <option value="Annual">Annual</option>
            <option value="Sick">Sick</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div>
          <label for="sdate">Start Date</label>
          <input type="date" id="sdate">
        </div>

        <div>
          <label for="edate">End Date</label>
          <input type="date" id="edate">
        </div>

        <div style="grid-column:1/-1">
          <label for="reason">Reason</label>
          <textarea id="reason" placeholder="Brief reason for leave..."></textarea>
        </div>

      </div>
      <button class="btn" onclick="saveEntry()">Submit Request</button>
    </div>

    <!-- LIST SECTION -->
    <div class="card">
      <h2>All Leave Requests</h2>

      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
        <button class="filter-btn" onclick="setFilter('approved', this)">Approved</button>
        <button class="filter-btn" onclick="setFilter('rejected', this)">Rejected</button>
      </div>

      <div id="entries-list">
        <p class="empty-state">No entries yet &mdash; add one above.</p>
      </div>
    </div>

    <!-- STATS SECTION -->
    <div class="card">
      <h2>Summary</h2>
      <div class="stats-bar">
        <div class="stat-box">
          <div class="stat-label">Total Requests</div>
          <div class="stat-val" id="total-count">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Pending</div>
          <div class="stat-val" id="pending-count">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Approved</div>
          <div class="stat-val" id="approved-count">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Rejected</div>
          <div class="stat-val" id="rejected-count">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Days Approved</div>
          <div class="stat-val" id="days-approved">0</div>
        </div>
      </div>
    </div>

  </div><!-- /container -->

<script>
  // ─── Data storage ────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'ho15-leave-requests';
  let activeFilter = 'all';

  function loadEntries() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  }

  function saveEntries(entries) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => (
      { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
    ));
  }

  // ─── Calculate days between two dates (inclusive) ───────────────────────────
  function calcDays(startDate, endDate) {
    const ms = new Date(endDate) - new Date(startDate);
    return Math.floor(ms / 86400000) + 1;
  }

  // ─── Save a new leave request ────────────────────────────────────────────────
  function saveEntry() {
    const name = document.getElementById('empname').value.trim();
    const type = document.getElementById('ltype').value;
    const start = document.getElementById('sdate').value;
    const end = document.getElementById('edate').value;
    const reason = document.getElementById('reason').value.trim();

    if (!name || !type || !start || !end || !reason) {
      alert('Please fill in all fields.');
      return;
    }

    if (new Date(end) < new Date(start)) {
      alert('End date cannot be before the start date.');
      return;
    }

    const days = calcDays(start, end);

    const entry = {
      id: Date.now(),
      name, type, start, end, reason, days,
      status: 'pending',
      submitted: new Date().toLocaleDateString()
    };

    const entries = loadEntries();
    entries.push(entry);
    saveEntries(entries);

    document.getElementById('empname').value = '';
    document.getElementById('ltype').value = '';
    document.getElementById('reason').value = '';

    renderList();
  }

  // ─── Render the requests list ────────────────────────────────────────────────
  function renderList() {
    const entries = loadEntries();
    const container = document.getElementById('entries-list');

    let visible = entries;
    if (activeFilter !== 'all') {
      visible = entries.filter(e => e.status === activeFilter);
    }

    if (visible.length === 0) {
      container.innerHTML = '<p class="empty-state">No entries yet &mdash; add one above.</p>';
      updateStats(entries);
      return;
    }

    const sorted = visible.slice().sort((a, b) => b.id - a.id);

    const rows = sorted.map(e => `
      <tr>
        <td>${escapeHtml(e.name)}</td>
        <td>${escapeHtml(e.type)}</td>
        <td>${escapeHtml(e.start)} &rarr; ${escapeHtml(e.end)}<br><span style="color:#9CA3AF;font-size:12px;">${e.days} day${e.days === 1 ? '' : 's'}</span></td>
        <td>${escapeHtml(e.reason)}</td>
        <td><span class="badge b-${e.status}">${e.status}</span></td>
        <td>
          ${e.status === 'pending' ? `
            <button class="row-btn" onclick="updateStatus(${e.id},'approved')">Approve</button>
            <button class="row-btn" onclick="updateStatus(${e.id},'rejected')">Reject</button>` : ''}
          <button class="row-btn del" onclick="deleteEntry(${e.id})">Delete</button>
        </td>
      </tr>`).join('');

    container.innerHTML = `
      <table>
        <thead><tr><th>Employee</th><th>Type</th><th>Dates</th><th>Reason</th><th>Status</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;

    updateStats(entries);
  }

  // ─── Approve or reject a request ────────────────────────────────────────────
  function updateStatus(id, status) {
    const entries = loadEntries();
    const entry = entries.find(e => e.id === id);
    if (!entry) return;
    entry.status = status;
    saveEntries(entries);
    renderList();
  }

  // ─── Delete a request ────────────────────────────────────────────────────────
  function deleteEntry(id) {
    if (!confirm('Delete this request?')) return;
    saveEntries(loadEntries().filter(e => e.id !== id));
    renderList();
  }

  // ─── Filter by status ────────────────────────────────────────────────────────
  function setFilter(status, btn) {
    activeFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }

  // ─── Update summary stats ────────────────────────────────────────────────────
  function updateStats(entries) {
    document.getElementById('total-count').textContent = entries.length;
    document.getElementById('pending-count').textContent = entries.filter(e => e.status === 'pending').length;
    document.getElementById('approved-count').textContent = entries.filter(e => e.status === 'approved').length;
    document.getElementById('rejected-count').textContent = entries.filter(e => e.status === 'rejected').length;
    const daysApproved = entries.filter(e => e.status === 'approved').reduce((s, e) => s + (e.days || 0), 0);
    document.getElementById('days-approved').textContent = daysApproved;
  }

  // ─── Initialise ──────────────────────────────────────────────────────────────
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('sdate').value = today;
  document.getElementById('edate').value = today;

  renderList();
</script>

</body>
</html>
